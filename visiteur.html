<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>👁️ VISITEUR - Compétition</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 10px;
            margin: 0;
        }
        
        .container {
            background: white;
            border-radius: 25px;
            padding: 20px 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            margin: 10px auto;
        }
        
        h1 {
            color: #2c3e50;
            border-bottom: 4px solid #2c3e50;
            padding-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            font-size: 1.8rem;
            text-align: center;
        }
        
        .visitor-badge {
            background: #2c3e50;
            color: white;
            padding: 6px 15px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-block;
        }
        
        .institut-badge {
            background: #3498db;
            color: white;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            display: inline-block;
            white-space: nowrap;
        }
        
        .info-box {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 15px;
            margin: 15px 0;
            text-align: center;
            border: 2px solid #2c3e50;
        }
        
        .refresh-badge {
            background: #27ae60;
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            display: inline-block;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .info-box p {
            font-size: 0.95rem;
        }
        
        /* TABLEAU RESPONSIVE */
        .table-wrapper {
            overflow-x: auto;
            margin: 15px 0;
            border-radius: 12px;
            -webkit-overflow-scrolling: touch;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            min-width: 320px;
        }
        
        th {
            background: #2c3e50;
            color: white;
            padding: 12px 8px;
            text-align: left;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        
        td {
            padding: 12px 8px;
            border-bottom: 1px solid #eef2f7;
            font-size: 0.9rem;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        tr:hover {
            background: #f8faff;
        }
        
        .clickable-name {
            cursor: pointer;
            color: #2c3e50;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            padding-right: 5px;
        }
        
        .clickable-name::after {
            content: "👆";
            font-size: 0.8rem;
            opacity: 0.6;
            margin-left: 5px;
        }
        
        .score {
            font-weight: bold;
            color: #2c3e50;
            font-size: 1.1rem;
            text-align: center;
        }
        
        .rank-1 { color: #f1c40f; font-weight: bold; }
        .rank-2 { color: #bdc3c7; font-weight: bold; }
        .rank-3 { color: #e67e22; font-weight: bold; }
        
        /* STATS */
        .stats {
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 10px;
            font-size: 0.9rem;
            text-align: center;
        }
        
        .stats span {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .stats span::before {
            font-size: 1.2rem;
            margin-bottom: 3px;
        }
        
        #totalCount::before { content: "👥"; }
        #moyenne::before { content: "📊"; }
        #meilleur::before { content: "🏆"; }
        
        /* PODIUM RESPONSIVE */
        .podium {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            padding: 15px 10px;
            background: #f8faff;
            border-radius: 15px;
            flex-wrap: wrap;
        }
        
        .podium-item {
            text-align: center;
            padding: 12px 8px;
            border-radius: 12px;
            min-width: 100px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            max-width: 120px;
        }
        
        .podium-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
        }
        
        .podium-1 { background: #f1c40f; color: #000; }
        .podium-2 { background: #bdc3c7; color: #000; }
        .podium-3 { background: #e67e22; color: white; }
        
        .podium-item div:first-child {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        
        .podium-item div:nth-child(2) {
            font-weight: bold;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .podium-item div:nth-child(3) {
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .podium-item div:last-child {
            font-size: 0.7rem;
            opacity: 0.9;
        }
        
        /* FILTRE */
        .filtre-section {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: stretch;
        }
        
        .filtre-section label {
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.95rem;
        }
        
        select {
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid #2c3e50;
            font-size: 1rem;
            width: 100%;
            background: white;
            -webkit-appearance: none;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 16px;
        }
        
        /* MODAL RESPONSIVE */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            padding: 15px;
            box-sizing: border-box;
        }
        
        .modal-content {
            background: white;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 25px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2c3e50;
            padding-bottom: 12px;
            margin-bottom: 15px;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        
        .modal-header h2 {
            font-size: 1.3rem;
            color: #2c3e50;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #666;
            padding: 0 10px;
        }
        
        .essai-item {
            padding: 12px;
            margin: 8px 0;
            background: #f0f5fa;
            border-radius: 12px;
            font-size: 1rem;
            text-align: center;
            font-weight: bold;
        }
        
        /* BOUTON RAFRAÎCHIR */
        .refresh-btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            margin: 10px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .refresh-btn:active {
            transform: scale(0.98);
            background: #2980b9;
        }
        
        /* NOTIFICATION */
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c3e50;
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 0.95rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 2000;
            white-space: nowrap;
            max-width: 90%;
            white-space: normal;
            text-align: center;
        }
        
        /* MESSAGE AIDE */
        .help-text {
            background: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 12px;
            margin: 10px 0;
            font-size: 0.9rem;
            text-align: center;
            border: 1px solid #ffeeba;
        }
        
        /* COMPTEUR ESSAIS */
        .essais-count {
            background: #e8f4fd;
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #2c3e50;
            white-space: nowrap;
        }
        
        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .podium-item { min-width: 80px; }
            td { font-size: 0.85rem; }
            th { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            👁️ ESPACE VISITEUR
            <span class="visitor-badge">Lecture seule</span>
        </h1>
        
        <div class="info-box">
            <span class="refresh-badge">🔄 Mise à jour en temps réel</span>
            <p>👆 Cliquez sur les noms pour voir les détails</p>
        </div>
        
        <!-- Message d'aide si pas de données -->
        <div id="helpMessage" class="help-text" style="display: none;">
            📱 Si le tableau est vide, demandez à l'admin de générer un lien de synchronisation
        </div>
        
        <!-- Filtre par institut -->
        <div class="filtre-section">
            <label>📋 Filtrer par institut</label>
            <select id="filtreInstitut" onchange="appliquerFiltre()">
                <option value="all">Tous les instituts</option>
            </select>
        </div>
        
        <!-- Bouton rafraîchir manuel -->
        <button class="refresh-btn" onclick="forcerRafraichissement()">
            🔄 Rafraîchir les données
        </button>
        
        <!-- Podium -->
        <div id="podium" class="podium"></div>
        
        <!-- Tableau responsive -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Compétiteur</th>
                        <th>Institut</th>
                        <th>Score</th>
                        <th>Essais</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align: center; padding: 30px;">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- Stats -->
        <div class="stats" id="stats">
            <span id="totalCount">0</span>
            <span id="moyenne">Moyenne: 0</span>
            <span id="meilleur">Meilleur: —</span>
        </div>
    </div>
    
    <!-- Modal détails -->
    <div id="essaisModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalNom">Détail</h2>
                <button class="close-btn" onclick="fermerModal()">&times;</button>
            </div>
            <div id="modalContenu"></div>
        </div>
    </div>
    
    <!-- Notification -->
    <div id="notification" class="notification"></div>
    
    <script>
        const STORAGE_KEY = 'scores_essais_complets';
        let competitors = [];
        let filtreInstitut = 'all';
        
        // Données par défaut (affichées si localStorage vide)
        const DEFAULT_DATA = [
            { id: '1', name: 'Léa', institut: 'INSAT', essais: [85, 92, 78] },
            { id: '2', name: 'Thomas', institut: 'ENIT', essais: [75, 88, 95] },
            { id: '3', name: 'Inès', institut: 'FST', essais: [92, 88, 96] },
            { id: '4', name: 'Raj', institut: 'ISSAT', essais: [65, 72, 80] },
            { id: '5', name: 'Sophie', institut: 'INSAT', essais: [45, 67] }
        ];
        
        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            
            if (saved) {
                try {
                    competitors = JSON.parse(saved);
                    document.getElementById('helpMessage').style.display = 'none';
                } catch(e) {
                    useDefaultData();
                }
            } else {
                useDefaultData();
            }
            
            updateFiltre();
            renderTable();
        }
        
        function useDefaultData() {
            competitors = JSON.parse(JSON.stringify(DEFAULT_DATA));
            document.getElementById('helpMessage').style.display = 'block';
        }
        
        function updateFiltre() {
            const instituts = [...new Set(competitors.map(c => c.institut))];
            const select = document.getElementById('filtreInstitut');
            let options = '<option value="all">Tous les instituts</option>';
            instituts.forEach(i => options += `<option value="${i}">${i}</option>`);
            select.innerHTML = options;
            select.value = filtreInstitut;
        }
        
        window.appliquerFiltre = function() {
            filtreInstitut = document.getElementById('filtreInstitut').value;
            renderTable();
        };
        
        function calculerTotal(essais) {
            return essais.reduce((s, v) => s + v, 0);
        }
        
        function getData() {
            let filtered = competitors;
            if (filtreInstitut !== 'all') {
                filtered = competitors.filter(c => c.institut === filtreInstitut);
            }
            return filtered.sort((a, b) => calculerTotal(b.essais) - calculerTotal(a.essais));
        }
        
        function renderTable() {
            const data = getData();
            const tbody = document.getElementById('tableBody');
            
            let html = '';
            if (data.length === 0) {
                html = '<tr><td colspan="5" style="text-align: center; padding: 30px;">📭 Aucun compétiteur</td></tr>';
            } else {
                data.forEach((comp, i) => {
                    const total = calculerTotal(comp.essais);
                    let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                    
                    html += `
                        <tr>
                            <td class="${rankClass}" style="font-weight: bold;">#${i + 1}</td>
                            <td>
                                <div class="clickable-name" onclick="afficherDetails('${comp.id}')">
                                    ${comp.name}
                                </div>
                            </td>
                            <td><span class="institut-badge">${comp.institut}</span></td>
                            <td class="score">${total}</td>
                            <td><span class="essais-count">${comp.essais.length}</span></td>
                        </tr>
                    `;
                });
            }
            
            tbody.innerHTML = html;
            
            // Podium
            const podium = document.getElementById('podium');
            if (data.length >= 3) {
                podium.innerHTML = '';
                for (let i = 0; i < 3; i++) {
                    const comp = data[i];
                    podium.innerHTML += `
                        <div class="podium-item podium-${i+1}" onclick="afficherDetails('${comp.id}')">
                            <div>${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</div>
                            <div>${comp.name}</div>
                            <div>${calculerTotal(comp.essais)}</div>
                            <div>${comp.institut}</div>
                        </div>
                    `;
                }
            } else {
                podium.innerHTML = '<p style="text-align: center; width: 100%;">Pas assez de participants pour le podium</p>';
            }
            
            // Stats
            document.getElementById('totalCount').innerHTML = `<span>${data.length} compétiteurs</span>`;
            if (data.length > 0) {
                const sum = data.reduce((a, c) => a + calculerTotal(c.essais), 0);
                document.getElementById('moyenne').innerHTML = `<span>Moyenne: ${Math.round(sum / data.length)}</span>`;
                const best = data[0];
                document.getElementById('meilleur').innerHTML = `<span>Meilleur: ${best.name} (${calculerTotal(best.essais)})</span>`;
            }
        }
        
        window.forcerRafraichissement = function() {
            loadData();
            showNotification("✅ Données rafraîchies !");
        };
        
        function showNotification(msg) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.style.display = 'block';
            setTimeout(() => {
                notif.style.display = 'none';
            }, 2000);
        }
        
        window.afficherDetails = function(id) {
            const comp = competitors.find(c => c.id === id);
            if (!comp) return;
            
            document.getElementById('modalNom').innerHTML = `${comp.name} <small style="font-size:0.8rem; color:#666;">${comp.institut}</small>`;
            
            let html = `
                <p style="text-align: center; font-size: 1.3rem; font-weight: bold; color: #2c3e50;">
                    Total: ${calculerTotal(comp.essais)}
                </p>
                <p style="margin: 15px 0 10px; font-weight: bold;">📊 ${comp.essais.length} essais :</p>
            `;
            
            if (comp.essais.length === 0) {
                html += '<p style="text-align: center; color: #666;">Aucun essai</p>';
            } else {
                comp.essais.forEach((e, i) => {
                    html += `<div class="essai-item">Essai #${i + 1}: <strong>${e}</strong></div>`;
                });
            }
            
            document.getElementById('modalContenu').innerHTML = html;
            document.getElementById('essaisModal').style.display = 'block';
        };
        
        window.fermerModal = function() {
            document.getElementById('essaisModal').style.display = 'none';
        };
        
        window.addEventListener('storage', e => {
            if (e.key === STORAGE_KEY) loadData();
        });
        
        window.onclick = e => {
            if (e.target === document.getElementById('essaisModal')) fermerModal();
        };
        
        // Détection si on vient de sync.html
        (function() {
            if (window.location.search.includes('synced=true')) {
                showNotification('✅ Données synchronisées !');
            }
        })();
        
        setInterval(loadData, 2000);
        loadData();
    </script>
</body>
</html>
