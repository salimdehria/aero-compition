<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 ADMIN - AERO COMPÉTITION</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #1a2634;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        h1 {
            color: #1d3a5c;
            border-bottom: 3px solid #1d3a5c;
            padding-bottom: 10px;
        }
        .admin-badge {
            background: #1d3a5c;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            display: inline-block;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th {
            background: #1d3a5c;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 2px;
        }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-primary { background: #3498db; color: white; }
        .add-section {
            background: #f0f5fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        input, select {
            padding: 8px;
            margin: 5px;
            border: 2px solid #dde4ec;
            border-radius: 5px;
        }
        .qr-section {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #f8faff;
            border-radius: 10px;
        }
        #qrcode {
            display: inline-block;
            padding: 10px;
            background: white;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>
            👑 PANEL ADMIN
            <span class="admin-badge">AERO COMPÉTITION</span>
        </h1>

        <!-- QR CODE FIXE -->
        <div class="qr-section">
            <h3>📱 QR CODE PERMANENT</h3>
            <div id="qrcode"></div>
            <p>Scannez une seule fois - Mise à jour automatique</p>
        </div>

        <!-- Ajout -->
        <div class="add-section">
            <h3>➕ Ajouter un participant</h3>
            <input type="text" id="nomInput" placeholder="Nom">
            <input type="text" id="institutInput" placeholder="Institut">
            <button class="btn btn-primary" onclick="creerCompetiteur()">Ajouter</button>
        </div>

        <!-- Ajout essai -->
        <div class="add-section">
            <h3>➕ Ajouter un essai</h3>
            <select id="selectCompetiteur"></select>
            <input type="number" id="essaiInput" value="0" min="0">
            <button class="btn btn-success" onclick="ajouterEssai()">Ajouter essai</button>
        </div>

        <!-- Tableau -->
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Institut</th>
                    <th>Essais</th>
                    <th>Total</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        // MOT DE PASSE
        (function() {
            const PASSWORD = "dehria12";
            if (localStorage.getItem('admin_auth') === 'ok') return;
            
            const password = prompt("Mot de passe admin:");
            if (password === PASSWORD) {
                localStorage.setItem('admin_auth', 'ok');
            } else {
                window.location.href = "index.html";
            }
        })();

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCUncMgmG6g3Xl7drWotu2v4zPaf8fCLP0",
            authDomain: "aero-compition.firebaseapp.com",
            databaseURL: "https://aero-compition-default-rtdb.firebaseio.com",
            projectId: "aero-compition",
            storageBucket: "aero-compition.firebasestorage.app",
            messagingSenderId: "717421617215",
            appId: "1:717421617215:web:64d54ebb8bba5a52a6d88a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const scoresRef = database.ref('competition/scores');

        let competitors = [];

        // Charger données
        scoresRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                competitors = data;
                renderTable();
                updateSelect();
            } else {
                // Données par défaut
                competitors = [
                    { id: '1', name: 'Test', institut: 'AERO', essais: [10, 20] }
                ];
                saveToFirebase();
            }
        });

        function saveToFirebase() {
            scoresRef.set(competitors);
        }

        function updateSelect() {
            const select = document.getElementById('selectCompetiteur');
            let options = '<option value="">Choisir...</option>';
            competitors.forEach(c => {
                options += `<option value="${c.id}">${c.name}</option>`;
            });
            select.innerHTML = options;
        }

        function calculerTotal(essais) {
            return essais.reduce((s, v) => s + v, 0);
        }

        function renderTable() {
            let html = '';
            competitors.forEach(comp => {
                html += `
                    <tr>
                        <td>${comp.name}</td>
                        <td>${comp.institut}</td>
                        <td>${comp.essais.join(', ')}</td>
                        <td><strong>${calculerTotal(comp.essais)}</strong></td>
                        <td>
                            <button class="btn btn-success" onclick="ajouterEssaiRapide('${comp.id}')">➕</button>
                            <button class="btn btn-danger" onclick="supprimerCompetiteur('${comp.id}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('tableBody').innerHTML = html;
        }

        window.creerCompetiteur = function() {
            const nom = document.getElementById('nomInput').value.trim();
            const institut = document.getElementById('institutInput').value.trim() || 'AERO';
            
            if (!nom) return alert('Entrez un nom');
            
            const newComp = {
                id: Date.now() + '',
                name: nom,
                institut: institut,
                essais: []
            };
            
            competitors.push(newComp);
            saveToFirebase();
            document.getElementById('nomInput').value = '';
        };

        window.ajouterEssai = function() {
            const id = document.getElementById('selectCompetiteur').value;
            const score = parseInt(document.getElementById('essaiInput').value);
            
            if (!id) return alert('Choisissez un participant');
            if (isNaN(score)) return alert('Score invalide');
            
            const comp = competitors.find(c => c.id === id);
            if (comp) {
                comp.essais.push(score);
                saveToFirebase();
            }
        };

        window.ajouterEssaiRapide = function(id) {
            const score = prompt('Score:');
            if (score !== null) {
                const val = parseInt(score);
                if (!isNaN(val)) {
                    const comp = competitors.find(c => c.id === id);
                    comp.essais.push(val);
                    saveToFirebase();
                }
            }
        };

        window.supprimerCompetiteur = function(id) {
            if (confirm('Supprimer ?')) {
                competitors = competitors.filter(c => c.id !== id);
                saveToFirebase();
            }
        };

        // QR Code
        const url = window.location.href.replace('admin.html', 'index.html');
        new QRCode(document.getElementById('qrcode'), {
            text: url,
            width: 200,
            height: 200
        });
    </script>
</body>
</html>
