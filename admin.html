<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 ADMIN - AERO COMPÉTITION</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a2634;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #1d3a5c;
            border-bottom: 3px solid #1d3a5c;
            padding-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .admin-badge {
            background: #1d3a5c;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .add-section {
            background: #f0f5fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        input, select {
            padding: 10px;
            margin: 5px;
            border: 2px solid #dde4ec;
            border-radius: 8px;
            font-size: 1rem;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin: 5px;
        }
        .btn-primary { background: #1d3a5c; color: white; }
        .btn-success { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        th {
            background: #1d3a5c;
            color: white;
            padding: 12px;
            text-align: left;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eef2f7;
        }
        .institut-badge {
            background: #3498db;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
        }
        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }
        .sync-badge {
            background: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- PROTECTION PAR MOT DE PASSE -->
    <script>
        (function() {
            const PASSWORD = "dehria12";
            if (localStorage.getItem('admin_auth') === 'ok') return;
            
            const password = prompt("🔐 ACCÈS ADMINISTRATEUR\n\nEntrez le mot de passe :");
            if (password === PASSWORD) {
                localStorage.setItem('admin_auth', 'ok');
            } else {
                alert("⛔ Mot de passe incorrect !");
                window.location.href = "index.html";
            }
        })();
    </script>

    <div class="container">
        <h1>
            👑 PANEL ADMINISTRATEUR
            <span class="admin-badge">AERO COMPÉTITION</span>
        </h1>

        <div class="sync-badge" id="syncBadge">
            🔑 Mode ADMIN - Modifiez les scores ici
        </div>

        <!-- SECTION AJOUT PARTICIPANT -->
        <div class="add-section">
            <h3>➕ AJOUTER UN PARTICIPANT</h3>
            <input type="text" id="nomInput" placeholder="Nom du participant">
            <input type="text" id="institutInput" placeholder="Institut (ex: INSAT, ENIT)" value="AERO">
            <button class="btn btn-primary" onclick="creerCompetiteur()">✅ AJOUTER</button>
        </div>

        <!-- SECTION AJOUT ESSAI -->
        <div class="add-section" style="background: #e8f4fd;">
            <h3>➕ AJOUTER UN ESSAI</h3>
            <select id="selectCompetiteur" style="min-width: 250px;">
                <option value="">-- Choisir un participant --</option>
            </select>
            <input type="number" id="essaiInput" placeholder="Score" value="0" min="0">
            <button class="btn btn-success" onclick="ajouterEssai()">✅ AJOUTER ESSAI</button>
        </div>

        <!-- TABLEAU DES PARTICIPANTS -->
        <table>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Institut</th>
                    <th>Essais</th>
                    <th>Total</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="5" style="text-align: center; padding: 30px;">Chargement...</td></tr>
            </tbody>
        </table>

        <!-- STATISTIQUES -->
        <div class="stats" id="stats">
            <span id="totalCount">0 participants</span>
            <span id="totalEssais">0 essais</span>
            <span id="moyenne">Moyenne: 0</span>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCUncMgmG6g3Xl7drWotu2v4zPaf8fCLP0",
            authDomain: "aero-compition.firebaseapp.com",
            databaseURL: "https://aero-compition-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aero-compition",
            storageBucket: "aero-compition.firebasestorage.app",
            messagingSenderId: "717421617215",
            appId: "1:717421617215:web:64d54ebb8bba5a52a6d88a"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const scoresRef = database.ref('competition/scores');

        let competitors = [];

        // Charger les données
        scoresRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.length > 0) {
                competitors = data;
            } else {
                // Données par défaut
                competitors = [
                    { id: '1', name: 'Léa', institut: 'INSAT', essais: [85, 92, 78] },
                    { id: '2', name: 'Thomas', institut: 'ENIT', essais: [75, 88, 95] }
                ];
                saveToFirebase();
            }
            renderTable();
            updateSelect();
            updateStats();
        });

        // Sauvegarder dans Firebase
        function saveToFirebase() {
            scoresRef.set(competitors);
        }

        // Mettre à jour le select
        function updateSelect() {
            const select = document.getElementById('selectCompetiteur');
            let options = '<option value="">-- Choisir un participant --</option>';
            competitors.forEach(comp => {
                options += `<option value="${comp.id}">${comp.name} (${comp.institut}) - ${comp.essais.length} essais</option>`;
            });
            select.innerHTML = options;
        }

        // Calculer total
        function calculerTotal(essais) {
            return essais.reduce((s, v) => s + v, 0);
        }

        // Afficher tableau
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            
            if (!competitors || competitors.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">Aucun participant</td></tr>';
                return;
            }

            let html = '';
            competitors.forEach(comp => {
                const total = calculerTotal(comp.essais);
                html += `
                    <tr>
                        <td><strong>${comp.name}</strong></td>
                        <td><span class="institut-badge">${comp.institut}</span></td>
                        <td>${comp.essais.join(', ') || '—'}</td>
                        <td><strong>${total}</strong></td>
                        <td>
                            <button class="btn btn-success" onclick="ajouterEssaiRapide('${comp.id}')">➕</button>
                            <button class="btn btn-danger" onclick="supprimerCompetiteur('${comp.id}')">🗑️</button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Mettre à jour stats
        function updateStats() {
            const totalParticipants = competitors.length;
            const totalEssais = competitors.reduce((acc, c) => acc + c.essais.length, 0);
            
            document.getElementById('totalCount').textContent = `${totalParticipants} participants`;
            document.getElementById('totalEssais').textContent = `${totalEssais} essais`;
            
            if (totalParticipants > 0) {
                const sum = competitors.reduce((acc, c) => acc + calculerTotal(c.essais), 0);
                document.getElementById('moyenne').textContent = `Moyenne: ${Math.round(sum / totalParticipants)}`;
            }
        }

        // Créer participant
        window.creerCompetiteur = function() {
            const nom = document.getElementById('nomInput').value.trim();
            const institut = document.getElementById('institutInput').value.trim() || 'AERO';
            
            if (!nom) {
                alert('Entrez un nom');
                return;
            }
            
            const newComp = {
                id: Date.now() + '-' + Math.random(),
                name: nom,
                institut: institut,
                essais: []
            };
            
            competitors.push(newComp);
            saveToFirebase();
            document.getElementById('nomInput').value = '';
        };

        // Ajouter essai (depuis le formulaire)
        window.ajouterEssai = function() {
            const compId = document.getElementById('selectCompetiteur').value;
            const score = parseInt(document.getElementById('essaiInput').value);
            
            if (!compId) {
                alert('Choisissez un participant');
                return;
            }
            
            if (isNaN(score) || score < 0) {
                alert('Score invalide');
                return;
            }
            
            const comp = competitors.find(c => c.id === compId);
            if (comp) {
                comp.essais.push(score);
                saveToFirebase();
                document.getElementById('essaiInput').value = '0';
            }
        };

        // Ajouter essai rapide (bouton +)
        window.ajouterEssaiRapide = function(id) {
            const score = prompt('Score du nouvel essai:', '0');
            if (score !== null) {
                const val = parseInt(score);
                if (!isNaN(val) && val >= 0) {
                    const comp = competitors.find(c => c.id === id);
                    comp.essais.push(val);
                    saveToFirebase();
                }
            }
        };

        // Supprimer participant
        window.supprimerCompetiteur = function(id) {
            if (confirm('Supprimer ce participant ?')) {
                competitors = competitors.filter(c => c.id !== id);
                saveToFirebase();
            }
        };
    </script>
</body>
</html>
