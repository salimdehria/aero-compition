<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👁️ AERO COMPÉTITION</title>
    <!-- Firebase SDK (version 8 - plus simple) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            background: #2c3e50;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 3px solid #2c3e50;
            padding-bottom: 10px;
        }
        .badge {
            background: #27ae60;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            text-align: center;
            margin: 10px 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th {
            background: #2c3e50;
            color: white;
            padding: 10px;
        }
        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }
        .clickable-name {
            cursor: pointer;
            color: #3498db;
            font-weight: bold;
        }
        .podium {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        .podium-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
        }
        .podium-1 { background: gold; }
        .podium-2 { background: silver; }
        .podium-3 { background: #cd7f32; color: white; }
        select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid #2c3e50;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 AERO COMPÉTITION</h1>
        <div class="badge">🔄 Mise à jour en temps réel</div>
        
        <select id="filtreInstitut" onchange="appliquerFiltre()">
            <option value="all">Tous les instituts</option>
        </select>
        
        <div id="podium" class="podium"></div>
        
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nom</th>
                    <th>Institut</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4">Chargement...</td></tr>
            </tbody>
        </table>
        
        <div id="stats" style="background: #2c3e50; color: white; padding: 10px; border-radius: 8px; text-align: center;">
            <span id="totalCount">0 participants</span>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCUncMgmG6g3Xl7drWotu2v4zPaf8fCLP0",
            authDomain: "aero-compition.firebaseapp.com",
            databaseURL: "https://aero-compition-default-rtdb.firebaseio.com",
            projectId: "aero-compition",
            storageBucket: "aero-compition.firebasestorage.app",
            messagingSenderId: "717421617215",
            appId: "1:717421617215:web:64d54ebb8bba5a52a6d88a"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const scoresRef = database.ref('competition/scores');

        let competitors = [];
        let filtreInstitut = 'all';

        // Données par défaut
        const DEFAULT_DATA = [
            { id: '1', name: 'Participant 1', institut: 'AERO', essais: [10, 20, 30] }
        ];

        // Écouter les changements
        scoresRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.length > 0) {
                competitors = data;
            } else {
                competitors = DEFAULT_DATA;
            }
            updateFiltre();
            renderTable();
        });

        function updateFiltre() {
            const instituts = [...new Set(competitors.map(c => c.institut))];
            const select = document.getElementById('filtreInstitut');
            let options = '<option value="all">Tous les instituts</option>';
            instituts.forEach(i => options += `<option value="${i}">${i}</option>`);
            select.innerHTML = options;
        }

        window.appliquerFiltre = function() {
            filtreInstitut = document.getElementById('filtreInstitut').value;
            renderTable();
        };

        function calculerTotal(essais) {
            return essais.reduce((s, v) => s + v, 0);
        }

        function renderTable() {
            let filtered = competitors;
            if (filtreInstitut !== 'all') {
                filtered = competitors.filter(c => c.institut === filtreInstitut);
            }
            const sorted = filtered.sort((a, b) => calculerTotal(b.essais) - calculerTotal(a.essais));

            // Tableau
            let html = '';
            sorted.forEach((comp, i) => {
                html += `
                    <tr>
                        <td>#${i + 1}</td>
                        <td class="clickable-name" onclick="afficherDetails('${comp.id}')">${comp.name}</td>
                        <td>${comp.institut}</td>
                        <td><strong>${calculerTotal(comp.essais)}</strong></td>
                    </tr>
                `;
            });
            document.getElementById('tableBody').innerHTML = html;

            // Podium
            if (sorted.length >= 3) {
                let podiumHtml = '';
                for (let i = 0; i < 3; i++) {
                    const comp = sorted[i];
                    podiumHtml += `
                        <div class="podium-item podium-${i+1}" onclick="afficherDetails('${comp.id}')">
                            <div>${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</div>
                            <div>${comp.name}</div>
                            <div>${calculerTotal(comp.essais)}</div>
                        </div>
                    `;
                }
                document.getElementById('podium').innerHTML = podiumHtml;
            }

            // Stats
            document.getElementById('totalCount').textContent = `${sorted.length} participants`;
        }

        window.afficherDetails = function(id) {
            const comp = competitors.find(c => c.id === id);
            if (!comp) return;
            
            let msg = `${comp.name} (${comp.institut})\n`;
            msg += `Total: ${calculerTotal(comp.essais)}\n`;
            msg += `Essais: ${comp.essais.join(', ')}`;
            alert(msg);
        };
    </script>
</body>
</html>
