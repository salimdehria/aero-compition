<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 AERO COMPÉTITION</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        .badge {
            background: #27ae60;
            color: white;
            padding: 10px;
            border-radius: 30px;
            text-align: center;
            margin: 15px 0;
        }
        select {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th {
            background: #667eea;
            color: white;
            padding: 12px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #eef2f7;
        }
        .clickable-name {
            cursor: pointer;
            color: #667eea;
            font-weight: bold;
        }
        .institut-badge {
            background: #667eea;
            color: white;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        .stats {
            background: #2c3e50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 AERO COMPÉTITION</h1>
        <div class="badge">🔴 Mise à jour EN DIRECT</div>
        
        <select id="filtreInstitut" onchange="appliquerFiltre()">
            <option value="all">Tous les instituts</option>
        </select>
        
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nom</th>
                    <th>Institut</th>
                    <th>Score</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <tr><td colspan="4" style="text-align: center;">Chargement...</td></tr>
            </tbody>
        </table>
        
        <div class="stats" id="stats">
            <span id="totalCount">0 participants</span>
        </div>
    </div>

    <script>
        // Configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCUncMgmG6g3Xl7drWotu2v4zPaf8fCLP0",
            authDomain: "aero-compition.firebaseapp.com",
            databaseURL: "https://aero-compition-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aero-compition",
            storageBucket: "aero-compition.firebasestorage.app",
            messagingSenderId: "717421617215",
            appId: "1:717421617215:web:64d54ebb8bba5a52a6d88a"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const scoresRef = database.ref('competition/scores');

        let competitors = [];
        let filtreInstitut = 'all';

        // Données par défaut
        const DEFAULT_DATA = [
            { id: '1', name: 'Léa', institut: 'INSAT', essais: [85, 92, 78] },
            { id: '2', name: 'Thomas', institut: 'ENIT', essais: [75, 88, 95] }
        ];

        // Écouter les changements
        scoresRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.length > 0) {
                competitors = data;
            } else {
                competitors = DEFAULT_DATA;
            }
            updateFiltre();
            renderTable();
        });

        function updateFiltre() {
            const instituts = [...new Set(competitors.map(c => c.institut))];
            const select = document.getElementById('filtreInstitut');
            let options = '<option value="all">Tous les instituts</option>';
            instituts.forEach(i => options += `<option value="${i}">${i}</option>`);
            select.innerHTML = options;
        }

        window.appliquerFiltre = function() {
            filtreInstitut = document.getElementById('filtreInstitut').value;
            renderTable();
        };

        function calculerTotal(essais) {
            return essais.reduce((s, v) => s + v, 0);
        }

        function renderTable() {
            let filtered = competitors;
            if (filtreInstitut !== 'all') {
                filtered = competitors.filter(c => c.institut === filtreInstitut);
            }
            const sorted = filtered.sort((a, b) => calculerTotal(b.essais) - calculerTotal(a.essais));

            let html = '';
            if (sorted.length === 0) {
                html = '<tr><td colspan="4" style="text-align: center;">Aucun participant</td></tr>';
            } else {
                sorted.forEach((comp, i) => {
                    html += `
                        <tr>
                            <td>#${i + 1}</td>
                            <td class="clickable-name" onclick="afficherDetails('${comp.id}')">${comp.name}</td>
                            <td><span class="institut-badge">${comp.institut}</span></td>
                            <td><strong>${calculerTotal(comp.essais)}</strong></td>
                        </tr>
                    `;
                });
            }
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('totalCount').textContent = `${sorted.length} participants`;
        }

        window.afficherDetails = function(id) {
            const comp = competitors.find(c => c.id === id);
            if (!comp) return;
            
            let msg = `${comp.name} (${comp.institut})\n`;
            msg += `Total: ${calculerTotal(comp.essais)}\n`;
            msg += `Essais: ${comp.essais.join(', ')}`;
            alert(msg);
        };
    </script>
</body>
</html>
