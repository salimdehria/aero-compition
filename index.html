<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 Compétition par essais</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.3rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            margin: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
        .admin-link {
            background: #e74c3c;
            color: white;
        }
        .admin-link:hover {
            background: #c0392b;
        }
        .refresh-info {
            margin-top: 30px;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .container { padding: 30px 15px; margin: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Compétition</h1>
        <p class="subtitle">par essais chronométrés</p>
        
        <a href="visiteur.html" class="btn">👁️ Voir les scores</a>
        <a href="admin.html" class="btn admin-link">👑 Espace Admin</a>
        
        <div class="refresh-info">
            🔄 Mise à jour automatique toutes les 2 secondes
        </div>
    </div>

    <script>
        // Auto-redirect to visitor page after 3 seconds (optional)
        setTimeout(() => {
            if (!sessionStorage.getItem('visited')) {
                window.location.href = 'visiteur.html';
            }
        }, 3000);
        
        sessionStorage.setItem('visited', 'true');
    </script>
</body>
</html>
