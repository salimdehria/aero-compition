<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏆 AERO COMPÉTITION</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin: 20px auto;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            font-size: 2rem;
            margin-bottom: 20px;
            border-bottom: 4px solid #667eea;
            padding-bottom: 15px;
        }

        .badge {
            background: #27ae60;
            color: white;
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            margin: 15px 0;
            font-weight: bold;
            font-size: 1.1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        select {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            border: 3px solid #667eea;
            border-radius: 15px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23667eea' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 15px center;
            background-size: 20px;
        }

        .podium {
            display: flex;
            gap: 10px;
            margin: 25px 0;
            justify-content: center;
            flex-wrap: wrap;
        }

        .podium-item {
            flex: 1;
            min-width: 100px;
            text-align: center;
            padding: 20px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .podium-item:hover {
            transform: translateY(-5px);
        }

        .podium-1 { 
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            color: #000;
        }
        .podium-2 { 
            background: linear-gradient(135deg, #bdc3c7, #95a5a6);
            color: #000;
        }
        .podium-3 { 
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
        }

        .podium-item div:first-child {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .podium-item div:nth-child(2) {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .podium-item div:nth-child(3) {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .table-wrapper {
            overflow-x: auto;
            margin: 25px 0;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #667eea;
            color: white;
            padding: 15px 10px;
            font-size: 1rem;
        }

        td {
            padding: 15px 10px;
            border-bottom: 1px solid #eef2f7;
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #f8faff;
        }

        .clickable-name {
            cursor: pointer;
            color: #667eea;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .clickable-name::after {
            content: "👆";
            font-size: 0.9rem;
            opacity: 0.6;
        }

        .institut-badge {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: inline-block;
        }

        .rank-1 { color: #f1c40f; font-weight: bold; }
        .rank-2 { color: #bdc3c7; font-weight: bold; }
        .rank-3 { color: #e67e22; font-weight: bold; }

        .stats {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            text-align: center;
        }

        .stats span {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .refresh-info {
            background: #f8faff;
            padding: 15px;
            border-radius: 50px;
            text-align: center;
            color: #667eea;
            font-weight: bold;
            margin-top: 20px;
            border: 2px solid #667eea;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: white;
            max-width: 400px;
            margin: 50px auto;
            padding: 25px;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .modal-header h2 {
            color: #2c3e50;
            font-size: 1.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #666;
        }

        .essai-item {
            background: #f0f5fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 480px) {
            .container { padding: 15px; }
            h1 { font-size: 1.5rem; }
            .podium-item { min-width: 80px; padding: 15px 5px; }
            td { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 AERO COMPÉTITION</h1>
        
        <div class="badge">
            🔄 Mise à jour en temps réel
        </div>
        
        <select id="filtreInstitut" onchange="appliquerFiltre()">
            <option value="all">Tous les instituts</option>
        </select>
        
        <div id="podium" class="podium"></div>
        
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nom</th>
                        <th>Institut</th>
                        <th>Score</th>
                        <th>Essais</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="5" style="text-align: center; padding: 40px;">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="stats" id="stats">
            <span id="totalCount">0 participants</span>
            <span id="moyenne">Moyenne: 0</span>
            <span id="meilleur">Meilleur: —</span>
        </div>
        
        <div class="refresh-info">
            🔄 Connecté - Les scores se mettent à jour automatiquement
        </div>
    </div>

    <!-- Modal -->
    <div id="essaisModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalNom">Détail</h2>
                <button class="close-btn" onclick="fermerModal()">&times;</button>
            </div>
            <div id="modalContenu"></div>
        </div>
    </div>

    <script>
        // Configuration Firebase (directement dans le fichier pour simplifier)
        const firebaseConfig = {
            apiKey: "AIzaSyCUncMgmG6g3Xl7drWotu2v4zPaf8fCLP0",
            authDomain: "aero-compition.firebaseapp.com",
            databaseURL: "https://aero-compition-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "aero-compition",
            storageBucket: "aero-compition.firebasestorage.app",
            messagingSenderId: "717421617215",
            appId: "1:717421617215:web:64d54ebb8bba5a52a6d88a"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const scoresRef = database.ref('competition/scores');

        // Variables
        let competitors = [];
        let filtreInstitut = 'all';

        // Données par défaut (au cas où)
        const DEFAULT_DATA = [
            { id: '1', name: 'Léa', institut: 'INSAT', essais: [85, 92, 78] },
            { id: '2', name: 'Thomas', institut: 'ENIT', essais: [75, 88, 95] },
            { id: '3', name: 'Inès', institut: 'FST', essais: [92, 88, 96] }
        ];

        // Écouter les changements en temps réel
        scoresRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.length > 0) {
                competitors = data;
                console.log("✅ Données reçues de Firebase:", competitors.length, "participants");
            } else {
                console.log("ℹ️ Aucune donnée dans Firebase, utilisation des données par défaut");
                competitors = DEFAULT_DATA;
            }
            updateFiltre();
            renderTable();
        }, (error) => {
            console.error("❌ Erreur Firebase:", error);
            competitors = DEFAULT_DATA;
            updateFiltre();
            renderTable();
        });

        function updateFiltre() {
            const instituts = [...new Set(competitors.map(c => c.institut))];
            const select = document.getElementById('filtreInstitut');
            let options = '<option value="all">Tous les instituts</option>';
            instituts.forEach(i => options += `<option value="${i}">${i}</option>`);
            select.innerHTML = options;
            select.value = filtreInstitut;
        }

        window.appliquerFiltre = function() {
            filtreInstitut = document.getElementById('filtreInstitut').value;
            renderTable();
        };

        function calculerTotal(essais) {
            return essais.reduce((s, v) => s + v, 0);
        }

        function renderTable() {
            let filtered = competitors;
            if (filtreInstitut !== 'all') {
                filtered = competitors.filter(c => c.institut === filtreInstitut);
            }
            const sorted = filtered.sort((a, b) => calculerTotal(b.essais) - calculerTotal(a.essais));

            // Tableau
            let html = '';
            if (sorted.length === 0) {
                html = '<tr><td colspan="5" style="text-align: center;">Aucun participant</td></tr>';
            } else {
                sorted.forEach((comp, i) => {
                    const total = calculerTotal(comp.essais);
                    let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
                    
                    html += `
                        <tr>
                            <td class="${rankClass}">#${i + 1}</td>
                            <td>
                                <span class="clickable-name" onclick="afficherDetails('${comp.id}')">
                                    ${comp.name}
                                </span>
                            </td>
                            <td><span class="institut-badge">${comp.institut}</span></td>
                            <td><strong>${total}</strong></td>
                            <td>${comp.essais.length}</td>
                        </tr>
                    `;
                });
            }
            document.getElementById('tableBody').innerHTML = html;

            // Podium
            if (sorted.length >= 3) {
                let podiumHtml = '';
                for (let i = 0; i < 3; i++) {
                    const comp = sorted[i];
                    podiumHtml += `
                        <div class="podium-item podium-${i+1}" onclick="afficherDetails('${comp.id}')">
                            <div>${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</div>
                            <div>${comp.name}</div>
                            <div>${calculerTotal(comp.essais)}</div>
                        </div>
                    `;
                }
                document.getElementById('podium').innerHTML = podiumHtml;
            } else {
                document.getElementById('podium').innerHTML = '';
            }

            // Stats
            document.getElementById('totalCount').textContent = `${sorted.length} participants`;
            if (sorted.length > 0) {
                const sum = sorted.reduce((a, c) => a + calculerTotal(c.essais), 0);
                document.getElementById('moyenne').textContent = `Moyenne: ${Math.round(sum / sorted.length)}`;
                const best = sorted[0];
                document.getElementById('meilleur').textContent = `Meilleur: ${best.name} (${calculerTotal(best.essais)})`;
            }
        }

        window.afficherDetails = function(id) {
            const comp = competitors.find(c => c.id === id);
            if (!comp) return;
            
            document.getElementById('modalNom').innerHTML = comp.name;
            
            let html = `
                <p style="text-align: center; font-size: 1.3rem; color: #667eea;">
                    Total: <strong>${calculerTotal(comp.essais)}</strong>
                </p>
                <p style="text-align: center;">Institut: ${comp.institut}</p>
                <hr>
                <p><strong>${comp.essais.length} essais:</strong></p>
            `;
            
            if (comp.essais.length === 0) {
                html += '<p style="text-align: center;">Aucun essai</p>';
            } else {
                comp.essais.forEach((e, i) => {
                    html += `<div class="essai-item">Essai #${i + 1}: ${e}</div>`;
                });
            }
            
            document.getElementById('modalContenu').innerHTML = html;
            document.getElementById('essaisModal').style.display = 'block';
        };

        window.fermerModal = function() {
            document.getElementById('essaisModal').style.display = 'none';
        };

        window.onclick = function(e) {
            if (e.target === document.getElementById('essaisModal')) {
                fermerModal();
            }
        };
    </script>
</body>
</html>
